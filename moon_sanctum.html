<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moon Sanctum - Light Path Puzzle</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at center,#12002b,#000);
  font-family:Segoe UI;
  color:white;
  overflow:hidden;
}

#screen{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:10;
  font-size:2rem;
  text-shadow:0 0 20px #ff77ff;
  color:#ff77ff;
  transition:1s;
}

#board{
  display:grid;
  grid-template-columns:repeat(4,80px);
  grid-template-rows:repeat(4,80px);
  gap:12px;
  opacity:0;
  transform:scale(0.7);
  transition:1s;
  z-index:1;
  position:relative;
}

.tile{
  width:80px; height:80px;
  background:rgba(30,0,50,0.6);
  border:2px solid #7c3aed;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:1.5rem;
  transition:0.3s;
}

.tile:hover{
  background:rgba(100,50,150,0.3);
  box-shadow:0 0 15px #a855f7;
}

.glow{
  animation:flash 0.6s ease;
  background:rgba(168,85,247,0.5);
}

@keyframes flash{
  0%{background:rgba(168,85,247,0);}
  50%{background:rgba(168,85,247,0.7);}
  100%{background:rgba(168,85,247,0);}
}
</style>
</head>
<body>

<div id="screen">✦ Enter the Moon Sanctum ✦</div>
<div id="board"></div>

<script>
const board = document.getElementById("board");
let tiles = [];
let sequence = [];
let playerSequence = [];
let roundFailed = false;
let failStreak = 0;
let boardSize = 16;
let runes = [];
let collectedRunes = [];

/* create board */
for(let i=0; i<boardSize; i++){
  const t = document.createElement("div");
  t.className="tile";
  t.onclick = () => playerClick(i);
  board.appendChild(t);
  tiles.push(t);
}

/* assign runes */
function assignRunes(){
  runes = [];
  collectedRunes = [];
  tiles.forEach(tile=>tile.innerHTML=""); // reset runes
  let empty = Array.from({length:boardSize}, (_,i)=>i);
  for(let i=0;i<3;i++){
    const idx = Math.floor(Math.random()*empty.length);
    runes.push(empty[idx]);
    empty.splice(idx,1);
  }
}

/* intro animation */
setTimeout(()=>{
  const overlay = document.getElementById("screen");
  overlay.style.opacity="0";
  setTimeout(()=>{
    overlay.remove();
    board.style.opacity="1";
    board.style.transform="scale(1)";
    startRound();
  },1000);
},1500);

function startRound(){
  roundFailed = false;
  playerSequence = [];
  sequence = [];
  assignRunes();
  generateSequence(4);
  playSequence();
}

function generateSequence(len){
  let empty = Array.from({length:boardSize}, (_,i)=>i);
  for(let i=0;i<len;i++){
    const idx = Math.floor(Math.random()*empty.length);
    sequence.push(empty[idx]);
    empty.splice(idx,1);
  }
}

function playSequence(){
  let delay = 0;
  sequence.forEach(i=>{
    setTimeout(()=>{
      tiles[i].classList.add("glow");
      setTimeout(()=>tiles[i].classList.remove("glow"),400);
    }, delay);
    delay += 600;
  });
}

function playerClick(i){
  // never block clicks
  tiles[i].classList.add("glow");
  setTimeout(()=>tiles[i].classList.remove("glow"),300);

  // collect rune
  if(runes.includes(i) && !collectedRunes.includes(i)){
    collectedRunes.push(i);
    tiles[i].innerHTML="✨";
  }

  if(roundFailed) return; // ignore clicks after round is marked failed (temporarily)

  const nextIndex = playerSequence.length;

  if(sequence[nextIndex] !== i){
    // wrong click, mark round failed
    roundFailed = true;
    failStreak++;

    if(failStreak >= 3){
      // mercy win
      showScreen("✦ The Ancient Watcher senses your struggle…<br> the path opens ✦", true, true);
      failStreak = 0;
    } else {
      showScreen("✦ The Ancient Watcher remains unconvinced ✦");
      // replay round after short delay
      setTimeout(()=>startRound(), 1500);
    }
    return;
  }

  // correct click
  playerSequence.push(i);

  if(playerSequence.length === sequence.length){
    roundFailed = true;
    failStreak = 0;
    let text = "✦ The Moon Sanctum accepts your mind ✦";
    if(collectedRunes.length === runes.length){
      text += "<br>All runes collected! The sanctum fully opens!";
    }
    showScreen(text, true);
  }
}

function showScreen(text, win=false, mercy=false){
  const s = document.createElement("div");
  s.id="screen";
  s.innerHTML = text + (win ? "<br><span id='countdown'>Next area opens in 3</span>" : "");
  document.body.appendChild(s);

  if(win){
    if(mercy){
      playerSequence = sequence.slice();
      collectedRunes = runes.slice();
      tiles.forEach((tile, idx)=>{
        if(runes.includes(idx)) tile.innerHTML="✨";
      });
    }

    let count = 3;
    const countdownEl = document.getElementById('countdown');
    const timer = setInterval(()=>{
      count--;
      if(countdownEl) countdownEl.innerHTML = "Next area opens in " + count;
      if(count <= 0){
        clearInterval(timer);
        window.location.href = "next_location.html";
      }
    },1000);
  } else {
    setTimeout(()=>{
      const old=document.getElementById("screen");
      if(old) old.remove();
    },2000);
  }
}

/* AI hint (optional, only for guidance) */
function showAIHint(){
  const remaining = sequence.slice(playerSequence.length);
  if(remaining.length === 0) return;

  let hintTile;
  const rand = Math.random();
  if(rand < 0.5){
    hintTile = remaining[0];
  } else if(rand < 0.8){
    hintTile = remaining[Math.floor(Math.random()*remaining.length)];
  } else return;

  tiles[hintTile].classList.add("glow");
  setTimeout(()=>tiles[hintTile].classList.remove("glow"),600);
}
</script>
</body>
</html>
