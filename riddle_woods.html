<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Riddle - Whispering Woods</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#fce4f3;
  font-family:'Comic Sans MS', cursive;
  text-align:center;
}

/* Card */
#box{
  background:white;
  padding:40px 50px;
  border-radius:20px;
  box-shadow:0 0 25px rgba(0,0,0,0.2);
  max-width:90%;
}

/* Title */
h2{
  margin-top:0;
  color:#4b0082;
}

/* Input */
input{
  margin-top:15px;
  padding:12px 20px;
  border-radius:25px;
  border:2px solid #8a2be2;
  text-align:center;
  outline:none;
}

input:focus{
  border-color:#d8bfd8;
}

/* Button */
button{
  margin-top:20px;
  padding:12px 28px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#8a2be2,#ba55d3);
  color:white;
  cursor:pointer;
  font-size:1rem;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 12px purple;
}

/* Wrong text */
#wrong{
  color:#e57373;
  margin-top:15px;
  display:none;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="box">
<h2>🌲 The forest whispers…</h2>

<p><b>Riddle to unlock the path:</b></p>

<p style="font-style:italic;">
What’s room has no door and windows?
</p>

<input id="answer" placeholder="type answer...">
<br>

<button onclick="checkAnswer()">Unlock Path →</button>

<div id="wrong"></div>
</div>

<script>
const wrongTexts = [
  "Nope… the mushrooms are hiding their secret 🍄",
  "Not quite… maybe another spot knows 🌿",
  "Haha, try again! The forest watches 👀",
  "This one’s silent… look elsewhere 🌲",
  "Wrong choice… the shadows giggle 😏"
];

function checkAnswer(){
  const ans = document.getElementById("answer").value.toLowerCase().trim();
  const wrong = document.getElementById("wrong");

  if(ans === "a mushroom"){
    showUnlockAnimation();
  } else {
    wrong.innerText = wrongTexts[Math.floor(Math.random() * wrongTexts.length)];
    wrong.style.display = "block";
    setTimeout(()=>wrong.style.display="none",2000);
  }
}

function showUnlockAnimation(){
  // Fullscreen black overlay
  const overlay = document.createElement("div");
  overlay.style.position="fixed";
  overlay.style.top="0";
  overlay.style.left="0";
  overlay.style.width="100vw";
  overlay.style.height="100vh";
  overlay.style.display="flex";
  overlay.style.justifyContent="center";
  overlay.style.alignItems="center";
  overlay.style.backgroundColor="black";
  overlay.style.zIndex="9999";
  overlay.style.flexDirection="column";
  document.body.appendChild(overlay);

  // Pink glowy text
  const pinkText = document.createElement("div");
  pinkText.style.color="#ff69b4";
  pinkText.style.fontSize="3rem";
  pinkText.style.textShadow="0 0 20px #ff69b4";
  pinkText.style.textAlign="center";
  pinkText.innerText="✦The shadows guide you forward✦";
  overlay.appendChild(pinkText);

  setTimeout(()=>{
    window.location.href="crystal_cavern_ultimate.html";
  },2000);
}
</script>

</body>
</html>
