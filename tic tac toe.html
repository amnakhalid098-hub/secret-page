<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moon Sanctum — Final Trial</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
color:white;
}

/* canvas */
canvas{
position:absolute;
top:0;
left:0;
}

/* watcher eyes */
#watcher{
position:absolute;
top:35%;
left:50%;
transform:translateX(-50%);
font-size:60px;
opacity:0;
transition:2s;
animation:breath 3s infinite ease-in-out;
}

@keyframes breath{
0%{transform:translateX(-50%) scale(1);}
50%{transform:translateX(-50%) scale(1.15);}
100%{transform:translateX(-50%) scale(1);}
}

/* dialogue box */
#box{
position:absolute;
bottom:8%;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:25px 35px;
border-radius:20px;
text-align:center;
max-width:650px;
display:none;
backdrop-filter:blur(10px);
}

input{
margin-top:15px;
padding:12px 20px;
border-radius:25px;
border:none;
outline:none;
text-align:center;
}

button{
margin-top:15px;
padding:10px 25px;
border:none;
border-radius:20px;
background:#ff77ff;
color:white;
cursor:pointer;
}

.glow{
font-size:40px;
color:#ff9bff;
text-shadow:0 0 25px #ff9bff,0 0 60px #ff9bff;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:.6}
50%{opacity:1}
100%{opacity:.6}
}

/* overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
}

/* vignette */
body:after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
box-shadow:inset 0 0 200px rgba(0,0,0,.9);
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="watcher">👁 👁</div>

<div id="box">
<div id="text"></div>
<input id="ans" placeholder="answer...">
<br>
<button onclick="check()">submit</button>
</div>

<audio id="whisper" src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_c8630c4d.mp3"></audio>
<audio id="hum" src="https://cdn.pixabay.com/download/audio/2021/09/06/audio_5c6c3e1d.mp3" loop></audio>

<script>
/* canvas */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

/* stars */
const stars=[];
for(let i=0;i<10;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
c:false
});
}

/* particles */
const particles=[];
for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+0.5,
d:Math.random()*0.6
});
}

/* draw */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* lines */
ctx.strokeStyle="#ff9bff";
ctx.lineWidth=2;
ctx.beginPath();
stars.forEach((s,i)=>{
if(s.c){
ctx.lineTo(s.x,s.y);
}else ctx.moveTo(s.x,s.y);
});
ctx.stroke();

/* stars */
stars.forEach(s=>{
ctx.beginPath();
ctx.fillStyle=s.c?"#ff9bff":"white";
ctx.arc(s.x,s.y,4+Math.sin(Date.now()/200)*1.5,0,Math.PI*2);
ctx.fill();
});

/* particles */
ctx.fillStyle="rgba(255,255,255,0.6)";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=p.d;
if(p.y>canvas.height)p.y=0;
});

requestAnimationFrame(draw);
}
draw();

/* click stars */
canvas.onclick=e=>{
stars.forEach(s=>{
if(Math.hypot(e.clientX-s.x,e.clientY-s.y)<15){
s.c=true;
}
});

if(stars.every(s=>s.c)){
document.getElementById("watcher").style.opacity=1;
setTimeout(startTrial,2000);
}
};

/* riddles */
const riddles=[
{
q:"I have keys but no locks, space but no room. What am I?",
a:"keyboard"
},
{
q:"I speak without voice and answer all. What am I?",
a:"book"
},
{
q:"I have hands yet cannot touch. What am I?",
a:"clock"
},
{
q:"I show truth yet hold none. What am I?",
a:"mirror"
},
{
q:"No lock holds me, yet only the worthy find me.",
a:["secret","truth","message","prize"]
}
];

let i=0;

/* start */
function startTrial(){
document.getElementById("box").style.display="block";
document.getElementById("hum").play();
show();
}

/* show riddle */
function show(){
document.getElementById("text").innerHTML=riddles[i].q;
document.getElementById("ans").value="";
}

/* check */
function check(){
let v=document.getElementById("ans").value.toLowerCase().trim();
let correct=riddles[i].a;

if(Array.isArray(correct)?correct.includes(v):v===correct){

document.body.style.boxShadow="0 0 120px #ff77ff inset";
setTimeout(()=>document.body.style.boxShadow="none",300);

i++;

if(i<riddles.length){
show();
}else ending();

}else{

document.getElementById("whisper").play();
document.body.style.transform="translateX(10px)";
setTimeout(()=>document.body.style.transform="translateX(-10px)",50);
setTimeout(()=>document.body.style.transform="translateX(0)",100);

}
}

/* ending */
function ending(){
document.body.style.transition="2s";
document.body.style.opacity="0";

setTimeout(()=>{
document.body.innerHTML=
'<div class="overlay"><div class="glow">The cosmos remembers you.</div><div style="margin-top:20px;font-size:18px;opacity:.8">You proved worthy.</div></div>';
document.body.style.opacity="1";
},2000);
}
</script>

</body>
</html>
