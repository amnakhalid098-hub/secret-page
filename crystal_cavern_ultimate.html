<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crystal Cavern Ultimate</title>

<style>
  #controls{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  z-index:999;
}
#controls button{
  font-size:22px;
  margin:6px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#1b1738;
  color:white;
}
body{
background:#0b0c2a;
color:white;
font-family:monospace;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
overflow:hidden;
touch-action: manipulation;
}

/* GRID */
#cavern{
display:grid;
grid-template-columns:repeat(7,60px);
grid-template-rows:repeat(6,60px);
gap:2px;
position:relative;
z-index:1;
}

.cell{
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
}

.wall{background:#222;}
.path{background:#0b0c2a;}
.start{background:#0a3;border-radius:50%;}
.end{background:#f90;border-radius:50%;}
.player{font-weight:bold}

/* ITEMS */
.crystal{animation:glow 1s infinite alternate;cursor:pointer}
.mirror{animation:mirrorGlow 1s infinite alternate;cursor:pointer}
.secret{animation:secretGlow 1s infinite alternate}

@keyframes glow{from{text-shadow:0 0 5px #0ff}to{text-shadow:0 0 20px #0ff}}
@keyframes mirrorGlow{from{text-shadow:0 0 5px #f0f}to{text-shadow:0 0 20px #f0f}}
@keyframes secretGlow{from{text-shadow:0 0 5px #ff0}to{text-shadow:0 0 25px #ff0}}

/* BEAM */
.beam{
position:absolute;
width:8px;
height:8px;
background:#ff0;
border-radius:50%;
z-index:5;
}

/* PARTICLES */
.spark{
position:absolute;
width:6px;
height:6px;
background:#fff;
border-radius:50%;
pointer-events:none;
animation:spark 1s linear forwards;
}

@keyframes spark{
0%{transform:scale(0);opacity:1}
100%{transform:scale(2);opacity:0}
}
</style>
</head>
<body>

<h2>✨ Crystal Cavern ✨</h2>
<div id="cavern"></div>
<p>Inventory: <span id="inventory">None</span></p>

<script>

/* MAP */
const paths=[
['#','#','#','#','#','#','#'],
['#','S','.','.','#','.','#'],
['#','.','#','.','.','.','#'],
['#','.','.','#','.','.','#'],
['#','#','.','D','#','E','#'],
['#','#','#','#','#','#','#']
];

/* ITEMS */
const crystals=[
{id:1,name:'Blue Crystal',type:'crystal',x:2,y:1},
{id:2,name:'Purple Crystal',type:'crystal',x:4,y:3},
{id:3,name:'Mirror Crystal',type:'mirror',x:3,y:2,message:'Reflect the light!'},
{id:4,name:'Hidden Prism',type:'secret',x:3,y:4,message:'The prism awakens!'}
];

let player={x:1,y:1};
let inventory=[];
let doorOpen=false;

/* RENDER */
function render(){
const grid=document.getElementById("cavern");
grid.innerHTML="";

for(let y=0;y<paths.length;y++){
for(let x=0;x<paths[0].length;x++){

const cell=document.createElement("div");
cell.className="cell";

if(player.x===x && player.y===y){
cell.textContent="🧍";
}

else{
const item=crystals.find(c=>c.x===x&&c.y===y);

if(item){
if(item.type==="crystal"){
cell.textContent="💎";
cell.classList.add("crystal");
cell.onclick=()=>collect(item);
}
else if(item.type==="mirror"){
cell.textContent="🪞";
cell.classList.add("mirror");
cell.onclick=()=>shootBeam(item);
}
else if(item.type==="secret"){
cell.textContent="🔮";
cell.classList.add("secret");
}
}
else{
const tile=paths[y][x];

if(tile==="#")cell.classList.add("wall");
else if(tile==="S")cell.classList.add("start");
else if(tile==="E")cell.classList.add("end");

else if(tile==="D"){
cell.textContent=doorOpen?"🚪":"🔒";
cell.classList.add("path");
}

else cell.classList.add("path");
}
}

grid.appendChild(cell);
}
}

document.getElementById("inventory").textContent=
inventory.length?inventory.join(", "):"None";
}

/* COLLECT CRYSTAL */
function collect(c){
if(inventory.includes(c.name))return;

inventory.push(c.name);
c.x=-1;
c.y=-1;
render();
}

/* BEAM SHOOT */
function shootBeam(mirror){

let x=mirror.x;
let y=mirror.y;
let dx=0;
let dy=-1;

const interval=setInterval(()=>{

x+=dx;
y+=dy;

if(!paths[y]||!paths[y][x]||paths[y][x]==="#"){
clearInterval(interval);
return;
}

spawnBeam(x,y);

const target=crystals.find(c=>c.x===x&&c.y===y&&c.type==="secret");

if(target){

inventory.push(target.name);
target.x=-1;
target.y=-1;

unlockDoor(x,y);

clearInterval(interval);
render();
}

},80);
}

/* BEAM VISUAL */
function spawnBeam(x,y){
const b=document.createElement("div");
b.className="beam";
b.style.left=(x*62+26)+"px";
b.style.top=(y*62+26)+"px";
document.body.appendChild(b);
setTimeout(()=>b.remove(),300);
}

/* DOOR MAGIC EFFECT */
function unlockDoor(px,py){

doorOpen=true;
  setTimeout(()=>{
alert("The cavern remembers your light…");
},300);

/* sparkle burst */
for(let i=0;i<25;i++){
const s=document.createElement("div");
s.className="spark";
s.style.left=(px*62+30+(Math.random()*40-20))+"px";
s.style.top=(py*62+30+(Math.random()*40-20))+"px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),1000);
}
}

/* MOVEMENT SYSTEM */
function move(dir){
let nx=player.x;
let ny=player.y;

if(dir==="up")ny--;
if(dir==="down")ny++;
if(dir==="left")nx--;
if(dir==="right")nx++;

if(paths[ny] && paths[ny][nx] && paths[ny][nx]!=="#" && !(paths[ny][nx]==="D"&&!doorOpen)){

player={x:nx,y:ny};

if(paths[ny][nx]==="E"){
alert("The crystal path accepts you.");
document.body.style.transition="opacity 1s";
document.body.style.opacity="0";
setTimeout(()=>window.location.href="reward_cavern.html",1000);
}

render();
}
}

/* KEYBOARD CONTROLS */
document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp")move("up");
if(e.key==="ArrowDown")move("down");
if(e.key==="ArrowLeft")move("left");
if(e.key==="ArrowRight")move("right");
});
  
/* INIT */
  window.move = move;
render();

</script>
  <div id="controls">
  <button onclick="move('up')">⬆</button>
  <div>
    <button onclick="move('left')">⬅</button>
    <button onclick="move('down')">⬇</button>
    <button onclick="move('right')">➡</button>
  </div>
</div>
</body>
</html>
