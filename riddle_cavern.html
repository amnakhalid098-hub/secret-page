<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cavern Riddle</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b0c2a;
font-family:monospace;
color:white;
text-align:center;
overflow:hidden;
}

/* Card */
#box{
background:#11153d;
padding:45px 55px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,255,255,0.15);
max-width:90%;
border:1px solid rgba(0,255,255,0.2);
}

/* Title */
h2{
margin-top:0;
color:#7df9ff;
text-shadow:0 0 12px #0ff;
}

/* Riddle text */
.riddle{
font-style:italic;
opacity:.9;
margin-top:10px;
}

/* Input */
input{
margin-top:20px;
padding:12px 20px;
border-radius:25px;
border:2px solid #0ff;
background:#0b0c2a;
color:white;
text-align:center;
outline:none;
font-family:monospace;
}

input:focus{
border-color:#7df9ff;
box-shadow:0 0 12px #0ff;
}

/* Button */
button{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#00ffff,#7df9ff);
color:#001;
cursor:pointer;
font-size:1rem;
font-family:monospace;
transition:.25s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 18px #0ff;
}

/* Wrong text */
#wrong{
color:#ff7a7a;
margin-top:18px;
display:none;
font-weight:bold;
text-shadow:0 0 8px red;
}
</style>
</head>
<body>

<div id="box">
<h2>✧ The Cavern Tests You ✧</h2>

<p><b>Answer to proceed:</b></p>

<p class="riddle">
If you throw a red stone into the blue sea, what will it become?
</p>

<input id="answer" placeholder="enter truth...">
<br>

<button onclick="checkAnswer()">Unlock Path →</button>

<div id="wrong"></div>
</div>

<script>
const wrongTexts = [
"The crystals dim in disappointment…",
"The cavern rejects that answer.",
"Truth echoes differently here.",
"The walls whisper: incorrect.",
"You are close… but not worthy yet."
];

function checkAnswer(){
const ans=document.getElementById("answer").value.toLowerCase().trim();
const wrong=document.getElementById("wrong");

if(ans==="wet"){
window.location.href="arcane_trial.html"; // ← MOVE REDIRECT HERE
}else{
wrong.innerText=wrongTexts[Math.floor(Math.random()*wrongTexts.length)];
wrong.style.display="block";
setTimeout(()=>wrong.style.display="none",2000);
}
}
</script>

</body>
</html>
