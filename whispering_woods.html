<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispering Woods</title>

<style>
body{
  margin:0;
  padding:0;
  font-family:'Comic Sans MS',cursive;
  overflow:hidden;
  height:100vh;
}

/* BACKGROUND */
#game-wrapper{
  position:relative;
  width:100vw;
  height:100vh;
  background:url("whispering_woods.png") center/cover no-repeat;
}

/* instruction */
#instruction{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:1.2rem;
  color:pink;
  text-shadow:1px 1px 3px black;
  z-index:20;
  pointer-events:none;
}

/* hidden items */
.item{
  position:absolute;
  width:28px;
  height:28px;
  border-radius:50%;
  cursor:pointer;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  opacity:0;               /* hidden initially */
  transition: opacity 0.4s; /* smooth reveal */
}

.item.revealed{
  opacity:1;              /* visible when clicked */
}

/* hint bubble */
#hint{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,.85);
  color:white;
  padding:12px 22px;
  border-radius:25px;
  font-size:1rem;
  box-shadow:0 0 15px rgba(0,0,0,.4);
  z-index:100;
}

/* inventory wrapper */
#inventoryWrapper{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:none;
  flex-direction:column;
  align-items:center;
  z-index:50;
}

/* toggle button */
#bagBtn{
  background:black;
  color:white;
  border:1px solid white;
  padding:6px 14px;
  border-radius:15px;
  cursor:pointer;
  margin-bottom:6px;
}

/* inventory bar */
#inventory{
  display:none;
  gap:10px;
  background:rgba(0,0,0,.7);
  padding:8px 12px;
  border-radius:14px;
}

.slot{
  width:42px;
  height:42px;
  background:rgba(255,255,255,.1);
  border:1px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  border-radius:6px;
}

/* fireflies */
.firefly{
  position:absolute;
  width:6px;
  height:6px;
  background:#fff;
  border-radius:50%;
  opacity:.7;
  animation:fly linear infinite;
}

@keyframes fly{
  from{transform:translateY(0)}
  to{transform:translateY(-120vh)}
}

/* fade overlay */
#fade{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:black;
  opacity:0;
  pointer-events:none;
  z-index:999;
  transition:opacity 1.2s;
}
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="instruction">Find the hidden treasure in the forest… 🌲</div>

  <div id="inventoryWrapper">
    <button id="bagBtn" onclick="toggleInventory()">Inventory</button>
    <div id="inventory"></div>
  </div>
</div>

<div id="hint"></div>
<div id="fade"></div>

<script>

/* SAVE ITEM SYSTEM */
function saveItem(name,icon){
  let items=JSON.parse(localStorage.getItem("inventoryItems")||"[]");
  if(!items.find(i=>i.name===name)){
    items.push({name,icon});
    localStorage.setItem("inventoryItems",JSON.stringify(items));
  }
}

/* INVENTORY UPDATE */
function updateInventory(){
  const wrapper=document.getElementById("inventoryWrapper");
  const inv=document.getElementById("inventory");
  inv.innerHTML="";

  const items=JSON.parse(localStorage.getItem("inventoryItems")||"[]");

  if(items.length===0){
    wrapper.style.display="none";
    return;
  }

  wrapper.style.display="flex";

  items.forEach(item=>{
    const s=document.createElement("div");
    s.className="slot";
    s.innerHTML=item.icon;
    inv.appendChild(s);
  });
}

/* toggle dropdown */
function toggleInventory(){
  const inv=document.getElementById("inventory");
  inv.style.display = inv.style.display==="flex" ? "none" : "flex";
}

/* ITEMS POSITIONS */
const spots=[
  [15,75],[35,60],[55,70],[70,55],[25,85],[60,80]
];

const itemIcons=["🗝️","🍄","🏮","🔮","✨","🪨"];
let correctIndex=0;

/* wrong texts */
const wrongTexts=[
  "The forest whispers… not this one 🌿",
  "A leaf rustles, but nothing happens 🍂",
  "This object hides its secret tonight 🌙",
  "The shadows shift… but not for you ✨",
  "Almost… but the magic resists your touch 🌲",
  "A firefly flutters by… try again 🪰",
  "Something glimmers, but it’s a trick 💫"
];

/* wrong click */
function wrongItem(it){
  it.classList.add('revealed'); // reveal when clicked
  const hint=document.getElementById("hint");
  hint.innerText=wrongTexts[Math.floor(Math.random()*wrongTexts.length)];
  hint.style.display="block";
  setTimeout(()=>hint.style.display="none",2000);
}

/* correct click */
  function correctItem(){
  saveItem("Ancient Key","🗝️");
  updateInventory();

  // fade whole page out
  document.body.style.transition = "opacity 0.8s ease";
  document.body.style.opacity = "0";

  // go to next page after fade finishes
  setTimeout(()=>{
    window.location.href="reward2.html";
  },800);
}

/* CREATE ITEMS */
const wrapper=document.getElementById("game-wrapper");

spots.forEach((pos,i)=>{
  const it=document.createElement("div");
  it.className="item";
  it.style.left=pos[0]+"%";
  it.style.top=pos[1]+"%";
  it.innerHTML=itemIcons[i];

  if(i===correctIndex) it.onclick=()=>correctItem(it);
  else it.onclick=()=>wrongItem(it);

  wrapper.appendChild(it);
});

/* FIREFLIES */
for(let i=0;i<25;i++){
  const f=document.createElement('div');
  f.className='firefly';
  f.style.left=Math.random()*100+'vw';
  f.style.top=Math.random()*100+'vh';
  f.style.animationDuration=(5+Math.random()*10)+'s';
  f.style.opacity=Math.random();
  wrapper.appendChild(f);
}

/* INIT */
updateInventory();

</script>
</body>
</html>
